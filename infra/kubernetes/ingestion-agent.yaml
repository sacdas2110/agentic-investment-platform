# Kubernetes Deployment - Ingestion Agent
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-agent
  namespace: investment-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingestion-agent
  template:
    metadata:
      labels:
        app: ingestion-agent
    spec:
      containers:
      - name: ingestion-agent
        image: investment-platform/ingestion-agent:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8001
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: investment-secrets
              key: database-url
        - name: REDIS_URL
          value: "redis://redis:6379/0"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        - name: QDRANT_URL
          value: "http://qdrant:6333"
        - name: S3_ENDPOINT
          value: "http://minio:9000"
        - name: INGESTION_AGENT_PORT
          value: "8001"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-agent
  namespace: investment-platform
spec:
  ports:
  - port: 8001
    targetPort: 8001
    protocol: TCP
  selector:
    app: ingestion-agent
