# Qdrant Vector Database Configuration
# Optimized for RAG use cases with investment documents

log_level: INFO

api_key: changeme  # Set via environment variable in production

http_port: 6333
grpc_port: 6334

storage:
  # Use snapshot based recovery
  snapshots_config:
    # Snapshots are not enabled by default
    snapshots_enabled: true
    # Snapshots are created every 1 hour
    schedule_period_sec: 3600

# Optimize for vector searches
performance:
  # Max number of threads in a single connection pool
  max_conn_threads: 8
  # Max number of requests in a queue
  max_request_queue_size: 10000
  # Enable SIMD for faster vector operations (on supported CPUs)
  enable_simd: true
